worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  client_max_body_size 0;
  keepalive_timeout 65;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_certificate /etc/nginx/tls/cert.pem;
  ssl_certificate_key /etc/nginx/tls/key.pem;

  log_format websocket '$remote_addr - $host "$request" $status '
                       'upgrade="$http_upgrade" connection="$connection_upgrade" '
                       'upstream="$upstream_addr" upstream_status="$upstream_status"';

  access_log /var/log/nginx/access.log websocket;
  error_log /var/log/nginx/error.log;

  gzip on;
  gzip_disable "msie6";

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_redirect off;

    location = / {
      return 302 /viewer/;
    }

    location = /viewer {
      return 301 /viewer/;
    }

    location /viewer/ {
      proxy_pass http://127.0.0.1:5173/viewer/;
    }

    location /sign_in {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://127.0.0.1:49100/sign_in;
    }
  }

  server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_redirect off;

    location = / {
      return 302 /viewer/;
    }

    location = /viewer {
      return 301 /viewer/;
    }

    location /viewer/ {
      proxy_pass http://127.0.0.1:5173/viewer/;
    }

    location /sign_in {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://127.0.0.1:49100/sign_in;
    }
  }
}
