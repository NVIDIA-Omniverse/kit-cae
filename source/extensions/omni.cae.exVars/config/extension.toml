[package]
# Semantic Versionning is used: https://semver.org/
version = "1.0.0"

# The title and description fields are primarly for displaying extension info in UI
title = "CAE Expression Variables"
description = "Allows specifying expressionVariables on the command line that get applied to all session layers on stage load."

# Path (relative to the root) or content of readme markdown file for UI.
readme = "docs/README.md"

# One of categories for UI.
category = "CAE"

# Keywords for the extension
keywords = ["kit", "cae", "expression", "variables", "usd"]

# Location of change log file in target (final) folder of extension, relative to the root.
# More info on writing changelog: https://keepachangelog.com/en/1.0.0/
changelog = "docs/CHANGELOG.md"

[dependencies]
"omni.usd" = {}

# Main python module this extension provides, it will be publicly available as "import omni.cae.exVars".
[[python.module]]
name = "omni.cae.exVars"

[documentation]
pages = [
    "docs/README.md",
    "docs/CHANGELOG.md",
]

[[test]]
dependencies = [
    "omni.cae.testing",
]
