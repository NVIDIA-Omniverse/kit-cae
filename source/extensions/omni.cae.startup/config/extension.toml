[package]
# Semantic Versionning is used: https://semver.org/
version = "1.0.0"

# The title and description fields are primarly for displaying extension info in UI
title = "CAE Startup"
description = "Extension that opens a USD file at startup once RTX has delivered its first frame."

# Path (relative to the root) or content of readme markdown file for UI.
readme  = "docs/README.md"

# One of categories for UI.
category = "CAE"

# Keywords for the extension
keywords = ["kit", "cae", "startup"]

# Location of change log file in target (final) folder of extension, relative to the root.
# More info on writing changelog: https://keepachangelog.com/en/1.0.0/
changelog="docs/CHANGELOG.md"

[dependencies]
"omni.usd" = {}

[settings]
# Path to a USD file to open after the first RTX frame has been delivered on startup.
# Leave empty (the default) to skip automatic stage loading.
exts."omni.cae.startup".usdFile = ""

# Main python module this extension provides, it will be publicly available as "import omni.cae.startup".
[[python.module]]
name = "omni.cae.startup"

[documentation]
pages = [
    "docs/CHANGELOG.md",
]
