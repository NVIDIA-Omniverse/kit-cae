[package]
# Semantic Versionning is used: https://semver.org/
version = "1.0.0"

# The title and description fields are primarly for displaying extension info in UI
title = "CAE Visualization"
description = "Extension that provides CAE visualization algorithms and utilities using OmniCaeViz schemas."

# Path (relative to the root) or content of readme markdown file for UI.
readme  = "docs/README.md"

# One of categories for UI.
category = "CAE"

# Keywords for the extension
keywords = ["kit", "cae", "visualization", "viz"]

# Location of change log file in target (final) folder of extension, relative to the root.
# More info on writing changelog: https://keepachangelog.com/en/1.0.0/
changelog="docs/CHANGELOG.md"

# Icon is shown in Extensions window, it is recommended to be square, of size 256x256.
icon = "data/icon.png"

[dependencies]
"omni.usd" = {}
"omni.cae.data" = {}
"omni.cae.schema" = {}
"omni.cae.dav" = {}
"omni.cae.material_library" = {}
"omni.kit.commands" = {}
"omni.cae.index" = {}
"omni.client" = {}

[settings]
# Whether operators should be created enabled by default
persistent.exts."omni.cae.viz".defaultOperatorEnabled = true

# Default device to use when CaeVizOperatorAPI.device is set to "auto"
persistent.exts."omni.cae.viz".defaultDeviceForAuto = "cuda:0"

# Default device to use when computing bounding boxes
persistent.exts."omni.cae.viz".defaultBoundingBoxDevice = "cuda:0"

# Whether to always use point bounds for bounding box computation
# When false, cell bounds will be used if cells are present
persistent.exts."omni.cae.viz".defaultBoundingBoxUsePointBounds = false

# Main python module this extension provides, it will be publicly available as "import omni.cae.viz".
[[python.module]]
name = "omni.cae.viz"

[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]

[[test]]
dependencies = [
    "omni.cae.delegate.cgns",
    "omni.cae.delegate.npz",
    "omni.cae.delegate.vtk",
    "omni.cae.importer.cgns",
    "omni.cae.importer.npz",
    "omni.cae.sids",
    "omni.cae.testing",
]
