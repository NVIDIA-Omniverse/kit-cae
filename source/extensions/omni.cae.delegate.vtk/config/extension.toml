[package]
title = "CAE VTK Delegate"
version = "1.0.0"
description = "Extension that provides VTK data delegates for reading VTK file formats (.vti, .vtu, .vts, .vtp, .vtk)."
category = "CAE"
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"
keywords = ["kit", "cae", "vtk"]
readme = "docs/README.md"

[dependencies]
"omni.cae.pip_prebundle" = {}
"omni.cae.data" = {}
"omni.cae.vtk_libs" = {}

[[python.module]]
name = "omni.cae.delegate.vtk"

[settings]
# Set to false to disable the direct-binary VTU reader (falls back to the
# standard VTK delegate).  Non-persistent: takes effect on next startup only.
exts."omni.cae.delegate.vtk".useCustomVtuReader = false

[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]
