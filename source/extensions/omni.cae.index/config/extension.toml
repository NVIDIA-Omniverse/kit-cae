[core]
# IndeX components are not reloadable
reloadable = false

[package]
version = "1.0.0"
title = "CAE IndeX"
description = "Extension providing IndeX Python bindings and generic Python-based importers and compute tasks."
category = "CAE"
readme  = "docs/README.md"
keywords = ["kit", "cae"]
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"

[dependencies]
"omni.cae.data" = {}
"omni.rtx.index_composite" = {}
"omni.usd" = {}
"omni.usd.core" = {}

[[python.module]]
name = "omni.cae.index"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]
cpp_api = [
]
