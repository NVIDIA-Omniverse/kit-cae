[package]
version = "1.0.0"
title = "CAE OpenFOAM Data"
description = "Extension that provides OpenFOAM data delegate for reading OpenFOAM field arrays."
category = "CAE"
readme  = "docs/README.md"
keywords = ["kit", "cae", "openfoam"]
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"

[dependencies]
"omni.cae.schema" = {}
"omni.cae.data" = {}

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]

[[test]]
dependencies = [
    "omni.cae.testing",
]
