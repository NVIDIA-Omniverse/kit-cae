[repo_schema]
# Enable the schema generation tool
enabled = true

[repo_usd]
usd_root = "${root}/_build/target-deps/usd/%{config}"
usd_python_root = "${root}/_build/target-deps/python"
generate_plugin_buildfiles = true
plugin_buildfile_format = "premake"
generate_root_buildfile = false

[repo_usd.plugin.omniCae]
plugin_dir = "${root}/source/schemas/shared/omniCae"
schema_file = "${root}/source/schemas/shared/omniCae/schema.usda"
generate_dir = "${root}/_build/generated/schemas/omniCae"
install_root = "${root}/_build/%{platform}/%{config}/schemas"
library_prefix = "OmniCae"
include_dir = "include/omniCae"
resources_dir = "plugins/OmniCae/resources"
module_dir = "OmniCae"
lib_dir = "lib"
bin_dir = "bin"
usd_lib_dependencies = [
    "arch",
    "tf",
    "vt",
    "sdf",
    "usd",
    "python"
]

