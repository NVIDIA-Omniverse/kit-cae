[package]
version = "1.0.0"
title = "CAE Scae Importer"
description = "Asset importer extension for importing Scae (.scae) files into USD."
category = "CAE"
readme  = "docs/README.md"
keywords = ["kit", "cae", "scae"]
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"

[dependencies]
"omni.cae.data" = {}
"omni.cae.schema" = {}
"omni.client" = {}
"omni.kit.tool.asset_importer" = {}

[[python.module]]
name = "omni.cae.importer.scae"

[documentation]
pages = [
    "docs/README.md",
    "docs/CHANGELOG.md",
]

[[test]]
dependencies = [
    "omni.cae.testing",
    "omni.cae.delegate.scae",
]
