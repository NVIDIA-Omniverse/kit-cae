########################################################################################################################
# Build-time pip dependencies
#
# Packages listed here are installed during `./repo.sh build` and made available
# at runtime through the omni.cae.pip_prebundle extension.
########################################################################################################################

[[dependency]]
python = "../../_build/target-deps/python"
packages = [
    "nvtx==0.2.14",
    "pyparsing==3.2.3",
    "trimesh==4.11.2",
]
target = "../../_build/target-deps/pip_prebundle"
platforms = ["*"]
download_only = false
install_dependencies = false
