name: streamlines
description: >
  Tests the agent's ability to create streamlines with seed geometry, velocity
  field binding, and color by a scalar field.
graded: true
kit_file: omni.cae.kit
data_file: disk_out_ref.npz
validator: validators/validate_05.py

prompt: |
  Import `data/disk_out_ref.npz` into Kit-CAE as "SIDS Unstructured" schema.
  Create streamlines seeded from a sphere, with:
  - Velocity driven by the "V" field
  - Color mapped to temperature (the "Temp" field)

  Remember that NPZ files imported as SIDS Unstructured require a field
  association fix before streamlines work.

  Capture a clean screenshot at 1280x720 and save to
  `{render_dir}/eval_05_streamlines.png`.

  Use the farm-style launch args for clean headless capture. Print
  RENDER_COMPLETE when done.

expected_outputs:
  - type: file
    path: "{render_dir}/eval_05_streamlines.png"
    min_size_bytes: 10000
    resolution: [1280, 720]
  - type: stage
    prims:
      - path_contains: Streamline
      - path_contains: Seed
      - path_contains: BoundingBox
